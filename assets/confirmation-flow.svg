<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-label="RedM Cache Cleaner confirmation flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181411"/>
      <stop offset="1" stop-color="#0b0908"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="1280" height="620" fill="url(#bg)"/>
  <text x="640" y="76" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#f2e4cc">Designed with Safe Confirmations</text>
  <text x="640" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#c2ab8a">Standard cache cleanup and optional nui-storage deletion are confirmed separately.</text>

  <rect x="128" y="170" width="460" height="278" rx="12" fill="#1e1a16" stroke="#564533" filter="url(#shadow)"/>
  <rect x="128" y="170" width="460" height="58" rx="12" fill="#4f1814"/>
  <text x="158" y="207" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#f2e4cc">Confirm RedM Cache Cleanup</text>
  <text x="168" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#f2e4cc">Are you sure you want to delete these folders?</text>
  <text x="198" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#e0ccac">• cache</text>
  <text x="198" y="348" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#e0ccac">• server-cache</text>
  <text x="198" y="378" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#e0ccac">• server-cache-priv</text>
  <rect x="364" y="394" width="86" height="36" rx="6" fill="#8f2d20"/>
  <text x="407" y="417" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#f2e4cc">Yes</text>
  <rect x="462" y="394" width="86" height="36" rx="6" fill="#27221d" stroke="#564533"/>
  <text x="505" y="417" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#f2e4cc">No</text>

  <path d="M620 310 H682" stroke="#8f2d20" stroke-width="5" stroke-linecap="round"/>
  <path d="M682 310 l-18 -13 v26 z" fill="#8f2d20"/>

  <rect x="724" y="170" width="460" height="278" rx="12" fill="#1e1a16" stroke="#564533" filter="url(#shadow)"/>
  <rect x="724" y="170" width="460" height="58" rx="12" fill="#4f1814"/>
  <text x="754" y="207" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#f2e4cc">Confirm nui-storage Deletion</text>
  <text x="764" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#f2e4cc">You selected nui-storage.</text>
  <text x="764" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#f2e4cc">Do you also want to delete the nui-storage folder?</text>
  <text x="764" y="354" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#c2ab8a">This prompt only appears when the optional checkbox is selected.</text>
  <rect x="960" y="394" width="86" height="36" rx="6" fill="#8f2d20"/>
  <text x="1003" y="417" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#f2e4cc">Yes</text>
  <rect x="1058" y="394" width="86" height="36" rx="6" fill="#27221d" stroke="#564533"/>
  <text x="1101" y="417" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#f2e4cc">No</text>
</svg>
